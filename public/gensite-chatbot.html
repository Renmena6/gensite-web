<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gensite Chatbot Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0a1628;
            --navy-mid: #112240;
            --navy-light: #1a3460;
            --electric: #2563ff;
            --electric-glow: #3b82f6;
            --electric-light: #60a5fa;
            --white: #f8fafc;
            --gray-soft: #cbd5e1;
            --gray-muted: #64748b;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: transparent;
        }

        .widget-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #chatButton {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--electric) 0%, var(--navy-light) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: none;
            box-shadow: 0 8px 32px rgba(10, 22, 40, 0.5);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        #chatButton:hover { transform: scale(1.08); }

        #chatWindow {
            width: 360px;
            height: 520px;
            margin-bottom: 12px;
            display: none;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            background: var(--navy);
            border: 1px solid rgba(37, 99, 255, 0.25);
            box-shadow: 0 32px 80px rgba(10, 22, 40, 0.8);
        }

        #chatWindow.open { display: flex; }

        .chat-header {
            padding: 16px 20px;
            background: var(--navy-mid);
            border-bottom: 1px solid rgba(37, 99, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--electric);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-info .name { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; color: var(--white); }
        .header-info .status { font-size: 11px; color: var(--success); }

        .message-area {
            flex-grow: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-message, .bot-message {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.55;
            animation: msg-in 0.3s ease;
        }

        @keyframes msg-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user-message { align-self: flex-end; background: var(--electric); color: white; border-bottom-right-radius: 4px; }
        .bot-message { align-self: flex-start; background: var(--navy-mid); color: var(--gray-soft); border-bottom-left-radius: 4px; }

        .input-area {
            padding: 12px 16px;
            background: var(--navy-mid);
            display: flex;
            gap: 8px;
        }

        #userInput {
            flex-grow: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(37, 99, 255, 0.2);
            border-radius: 12px;
            padding: 10px 14px;
            color: white;
            outline: none;
        }

        .quick-replies { display: flex; flex-direction: column; gap: 7px; margin-top: 10px; }
        .quick-btn {
            background: rgba(37, 99, 255, 0.1);
            border: 1px solid var(--electric);
            color: var(--electric-light);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 12px;
        }

        .capture-form { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .capture-form input { margin-bottom: 5px; }
        .capture-form button { background: var(--electric); color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="widget-container">
    <div id="chatWindow">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar">🤖</div>
                <div class="header-info">
                    <div class="name">Asistente Gensite</div>
                    <div class="status">● En línea</div>
                </div>
            </div>
            <div style="color:white; cursor:pointer;" onclick="toggleChat()">✕</div>
        </div>

        <div id="messageArea" class="message-area"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribí tu consulta..." onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
    </div>

    <button id="chatButton" onclick="toggleChat()">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
</div>

<script>
    const API_KEY = "AIzaSyAwqIvUdsGybs26GqL3UEOoAOR5qYP_rkw"; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemma-3-4b-it:generateContent?key=${API_KEY}`;

    // Esta es la "personalidad" que le inyectamos al inicio
    const PERSONALIDAD = "Eres el asistente de Gensite. Expertos en Webs, IA y Dashboards. Responde corto, profesional y en español de Argentina. Si quieren contratar, pide Nombre y Email. IMPORTANTE: Si pides datos, incluye al final el texto [CAPTURE_LEAD].";

    let chatHistory = [];
    let captureMode = false;

    function toggleChat() {
        const win = document.getElementById('chatWindow');
        const isOpen = win.classList.toggle('open');
        if(isOpen && chatHistory.length === 0) showWelcome();
    }

    function showWelcome() {
        const area = document.getElementById('messageArea');
        const div = document.createElement('div');
        div.className = 'bot-message';
        div.innerHTML = `¡Hola! 👋 Bienvenido a <strong>Gensite</strong>. ¿Cómo puedo potenciar tu proyecto hoy?
        <div class="quick-replies">
            <button class="quick-btn" onclick="sendQuick('Quiero una web')">🌐 Quiero una web profesional</button>
            <button class="quick-btn" onclick="sendQuick('Busco automatizar')">🤖 Busco automatizar tareas</button>
        </div>`;
        area.appendChild(div);
        
        // Inicializamos el historial con la personalidad oculta
        chatHistory.push({role: "user", parts: [{text: PERSONALIDAD}]});
        chatHistory.push({role: "model", parts: [{text: "Entendido, soy el asistente de Gensite."}]});
    }

    function sendQuick(txt) {
        document.getElementById('userInput').value = txt;
        sendMessage();
    }

    function addMessage(role, text) {
        const area = document.getElementById('messageArea');
        const div = document.createElement('div');
        div.className = role === 'model' ? 'bot-message' : 'user-message';
        div.innerHTML = text.replace(/\n/g, '<br>').replace('[CAPTURE_LEAD]', '');
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
    }

    async function sendMessage() {
        if(captureMode) return;
        const input = document.getElementById('userInput');
        const msg = input.value.trim();
        if(!msg) return;

        addMessage('user', msg);
        chatHistory.push({role: "user", parts: [{text: msg}]});
        input.value = '';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: chatHistory }) 
            });

            const data = await response.json();
            
            if (data.error) {
                console.error(data.error);
                addMessage('model', "Error de cuota o clave. Reintenta.");
                return;
            }

            const botText = data.candidates[0].content.parts[0].text;

            if (botText.includes('[CAPTURE_LEAD]')) {
                addMessage('model', botText);
                showForm();
            } else {
                addMessage('model', botText);
                chatHistory.push({role: "model", parts: [{text: botText}]});
            }
        } catch (e) {
            addMessage('model', "Error de conexión.");
        }
    }

    function showForm() {
        captureMode = true;
        const div = document.createElement('div');
        div.className = 'bot-message';
        div.innerHTML = `<div class="capture-form">
            <input id="f_name" placeholder="Tu Nombre" style="width:100%; padding:5px; margin-bottom:5px;">
            <input id="f_mail" placeholder="Tu Email" style="width:100%; padding:5px; margin-bottom:5px;">
            <button onclick="saveLead()" style="width:100%; background:#2563ff; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">Enviar datos</button>
        </div>`;
        document.getElementById('messageArea').appendChild(div);
    }

    function saveLead() {
        const name = document.getElementById('f_name').value;
        if(!name) return alert("Poné tu nombre");
        addMessage('model', `¡Excelente ${name}! Un humano de Gensite te va a contactar pronto.`);
        captureMode = false;
    }
</script>
</body>
</html>
